    <div class="auth-layout">
      <app-auth-hero
        title="Complete the password reset securely."
        description="Paste the reset token from the forgot password step and set a fresh credential to get your team back in quickly."
      />

      <section class="card">
        <div>
          <p class="eyebrow">Secure reset</p>
          <h2>Reset password</h2>
        </div>

        <form [formGroup]="form" (ngSubmit)="submit()">
          <label><span>Reset token</span><textarea rows="3" formControlName="token"></textarea></label>
          <label><span>New password</span><input type="password" formControlName="password"></label>

          @if (message()) {
            <p class="success">{{ message() }}</p>
          }
          @if (error()) {
            <p class="error">{{ error() }}</p>
          }

          <button type="submit" [disabled]="form.invalid || submitting()">
            {{ submitting() ? 'Updating...' : 'Update password' }}
          </button>
        </form>

        <a routerLink="/login" class="aux-link">Back to login</a>
      </section>
    </div>
