    <div class="auth-layout">
      <app-auth-hero
        title="Reset access without friction."
        description="The forgot password flow uses your backend reset-token endpoint and keeps the handoff simple for warehouse staff."
      />

      <section class="card">
        <div>
          <p class="eyebrow">Password recovery</p>
          <h2>Forgot password</h2>
          <p class="copy">Enter your email to generate a reset token.</p>
        </div>

        <form [formGroup]="form" (ngSubmit)="submit()">
          <label><span>Email</span><input type="email" formControlName="email"></label>
          @if (message()) {
            <p class="success">{{ message() }}</p>
          }
          @if (token()) {
            <p class="token">Reset token: <strong>{{ token() }}</strong></p>
          }
          @if (error()) {
            <p class="error">{{ error() }}</p>
          }
          <button type="submit" [disabled]="form.invalid || submitting()">{{ submitting() ? 'Submitting...' : 'Send reset token' }}</button>
        </form>

        <a routerLink="/reset-password" class="aux-link">Already have a reset token?</a>
      </section>
    </div>
