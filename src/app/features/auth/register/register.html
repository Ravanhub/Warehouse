    <div class="auth-layout">
      <app-auth-hero
        title="Set up admin and staff access in minutes."
        description="Create secure accounts for warehouse teams with role-based access for operations, inventory updates, and scanning."
      />

      <section class="card">
        <div>
          <p class="eyebrow">Account setup</p>
          <h2>Register</h2>
        </div>

        <form [formGroup]="form" (ngSubmit)="submit()">
          <label><span>Username</span><input type="text" formControlName="username"></label>
          <label><span>Email</span><input type="email" formControlName="email"></label>
          <label><span>Password</span><input type="password" formControlName="password"></label>

          <label>
            <span>Role</span>
            <select formControlName="role">
              <option value="USER">User</option>
              <option value="ADMIN">Admin</option>
            </select>
          </label>

          @if (message()) {
            <p class="success">{{ message() }}</p>
          }
          @if (error()) {
            <p class="error">{{ error() }}</p>
          }

          <button type="submit" [disabled]="form.invalid || submitting()">
            {{ submitting() ? 'Creating account...' : 'Create account' }}
          </button>
        </form>

        <p class="footer-copy">
          Already registered?
          <a routerLink="/login">Go to login</a>
        </p>
      </section>
    </div>
